name: Deploy Vite to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: workstudy-frontend
        run: npm install

      - name: Build
        working-directory: workstudy-frontend
        run: npm run build

      - name: Add nojekyll
        run: touch workstudy-frontend/dist/.nojekyll

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: workstudy-frontend/dist
          force_orphan: true